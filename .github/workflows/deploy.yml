name: Build and deploy to GitHub Pages

# Builds the static dashboard, fetching fresh World Cup data at build time, and
# publishes it to GitHub Pages. There is no live backend — the API key lives in
# the FOOTBALL_DATA_API_KEY repository secret and never reaches the browser.

on:
  # Refresh the data on a schedule. Every 30 minutes (UTC). GitHub may delay
  # scheduled runs under load, so effective freshness is ~30-45 min. Tune the
  # cron below to taste — */15 for fresher, 0 */1 for hourly, etc.
  schedule:
    - cron: "*/30 * * * *"
  # Rebuild on every push to main (code changes).
  push:
    branches: [main]
  # Manual "refresh now" button in the Actions tab. This is also the hook the
  # stretch-goal user-facing refresh would call (repository_dispatch / API).
  workflow_dispatch:

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fetch dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch World Cup data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        # Serve under /<repo>/ on github.io project pages.
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
